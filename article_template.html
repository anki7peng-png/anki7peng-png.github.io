<!-- 文章模板 - 复制此内容并根据需要修改 -->
<div id="articleX" class="article">
    <h3>文章标题</h3>
    
    <!-- 段落示例 -->
    <p><strong>一、主标题</strong><br>
        这里是正文内容，可以包含普通文本。
    </p>
    
    <!-- 带有子标题和列表的段落示例 -->
    <p><strong>二、主标题带有子项目</strong><br>
        <strong>1. 子标题</strong><br>  
        - <strong>关键词</strong>：关键词解释和说明内容<br>  
        - <strong>另一个关键词</strong>：更多解释内容<br>
        <strong>2. 另一个子标题</strong><br>  
        - <strong>项目一</strong>：项目描述<br>  
        - <strong>项目二</strong>：项目描述<br>
    </p>
    
    <!-- 普通段落 -->
    <p><strong>三、结论</strong><br>
        这里是结论部分的内容。
    </p>
    
    <!-- 转载声明区域 -->
    <div class="article-source">
        <p><strong>转载声明</strong><br>
            内容来源：本文内容来源说明<br>  
            版权说明：原文版权归原作者及发布平台所有<br>  
            转载用途：仅用于个人主页学习交流，不涉及商业用途<br>  
            原文链接：<a href="https://example.com/article" target="_blank">https://example.com/article</a></p>
    </div>
    
    <!-- 文章标签 -->
    <div class="article-tags">
        <span class="article-tag">标签1</span>
        <span class="article-tag">标签2</span>
        <span class="article-tag">标签3</span>
    </div>
</div>

<!-- 
使用说明：
1. 将此模板复制到index.html中的.article-content区域内
2. 修改id="articleX"为您需要的ID（如article6, article7等）
3. 在左侧文章列表中添加对应的标题，确保data-article属性与ID匹配
4. 填写您的文章内容，可以使用以下HTML标签：
   - <strong>...</strong> 用于加粗文本
   - <br> 用于换行
   - <a href="链接地址" target="_blank">链接文本</a> 用于添加可点击链接
5. 保存文件后查看效果
-->
